name: Build Animus VPN
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Качаем всю историю для корректной работы сабмодулей

      - name: Senior Submodule Fix (Iterative)
        run: |
          # Используем цикл для пошаговой распаковки "матрёшки" до 5 уровней в глубину.
          # Это перехватывает новые файлы .gitmodules до того, как Git пойдет глубже.
          for i in {1..5}; do
            echo "--- Обработка уровня вложенности $i ---"
            
            # 1. Ищем ВСЕ существующие на данный момент .gitmodules и меняем SSH на HTTPS
            find . -name ".gitmodules" -type f -exec sed -i 's|git@github.com:|https://github.com/|g' {} + || true
            find . -name ".gitmodules" -type f -exec sed -i 's|ssh://git@github.com/|https://github.com/|g' {} + || true
            
            # 2. Синхронизируем конфигурацию
            git submodule sync --recursive || true
            
            # 3. Скачиваем ТОЛЬКО один следующий уровень (строго без --recursive).
            # Команда foreach заходит в каждый скачанный модуль и скачивает его прямых детей.
            git submodule update --init || true
            git submodule foreach --recursive 'git submodule update --init' || true
          done
          
          # 4. Финальная проверка: когда все SSH заменены, делаем полную рекурсивную сборку
          git submodule update --init --recursive

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21' # Нужно для сборки ядра sing-box

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: animus-vpn-debug-file
          path: build/app/outputs/flutter-apk/app-debug.apk
