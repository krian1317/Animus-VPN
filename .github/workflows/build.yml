name: Build Animus VPN
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Качаем всю историю для корректной работы сабмодулей

      - name: Senior Submodule Fix
        run: |
          # Принудительно настраиваем Git на HTTPS для всех уровней вложенности
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          
          # Находим все файлы .gitmodules и меняем SSH на HTTPS прямо в них
          find . -name ".gitmodules" -type f -exec sed -i 's|git@github.com:|https://github.com/|g' {} +
          find . -name ".gitmodules" -type f -exec sed -i 's|ssh://git@github.com/|https://github.com/|g' {} +
          
          # Инициализируем сабмодули первого уровня
          git submodule init
          
          # Теперь магия: рекурсивно обновляем всё, игнорируя ошибки протоколов
          git submodule update --init --recursive --force

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21' # Нужно для сборки ядра sing-box

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: animus-vpn-debug-file
          path: build/app/outputs/flutter-apk/app-debug.apk
