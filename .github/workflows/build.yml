name: Build Animus VPN
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Качаем всю историю для корректной работы сабмодулей

      - name: Senior Submodule Fix (Step-by-Step)
        run: |
          # Шаг 1: Инициализируем и скачиваем ТОЛЬКО первый уровень (hiddify-core). Без рекурсии!
          git submodule update --init
          
          # Шаг 2: Теперь hiddify-core и его внутренний .gitmodules существуют на диске. 
          # Находим все файлы .gitmodules во всем проекте и меняем SSH на HTTPS
          find . -name ".gitmodules" -type f -exec sed -i 's|git@github.com:|https://github.com/|g' {} +
          find . -name ".gitmodules" -type f -exec sed -i 's|ssh://git@github.com/|https://github.com/|g' {} +
          
          # Шаг 3: Принудительно синхронизируем изменения из .gitmodules во внутренний конфиг Git
          git submodule sync --recursive
          
          # Шаг 4: Теперь безопасно скачиваем все остальные вложенные сабмодули
          git submodule update --init --recursive --force

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21' # Нужно для сборки ядра sing-box

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: animus-vpn-debug-file
          path: build/app/outputs/flutter-apk/app-debug.apk
