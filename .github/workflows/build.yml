name: Build Animus VPN
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Senior Submodule Fix (Iterative)
        run: |
          for i in {1..5}; do
            echo "--- Обработка уровня вложенности $i ---"
            find . -name ".gitmodules" -type f -exec sed -i 's|git@github.com:|https://github.com/|g' {} + || true
            find . -name ".gitmodules" -type f -exec sed -i 's|ssh://git@github.com/|https://github.com/|g' {} + || true
            git submodule sync --recursive || true
            git submodule update --init || true
            git submodule foreach --recursive 'git submodule update --init' || true
          done
          git submodule update --init --recursive

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: animus-vpn-debug-file
          path: build/app/outputs/flutter-apk/app-debug.apk
